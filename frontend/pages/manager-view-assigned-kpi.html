<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assigned KPIs</title>
    <link rel="icon" href="../assets/images/logo.png" />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FontAwesome for icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- External CSS -->
    <link rel="stylesheet" href="../styles/style.css" />
  </head>

  <body>
    <button class="menu-toggle-btn d-md-none" type="button" id="sidebarToggle">
      ☰
    </button>

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <nav class="d-md-block sidebar" id="sidebarMenu">
          <div class="sidebar-sticky p-3">
            <img
              src="../assets/images/logo.png"
              alt="KPI System Logo"
              class="img-fluid mb-4"
              style="max-width: 120px"
            />
            <ul class="nav flex-column" id="sidebarLinks">
              <!-- Menu items will be dynamically inserted here -->
            </ul>
          </div>
        </nav>

        <!-- Main Content -->
        <main class="col-12 col-md-10 px-4" id="main-content">
          <div class="mt-4">
            <h1 class="mb-3">View Assigned KPIs</h1>
            <a
              href="manager-assign-kpi.html"
              class="btn btn-teal btn-lg mb-4"
              title="Assign New KPI"
            >
              Assign New KPI
            </a>
            <button id="BTN-RESET"></button>
          </div>

          <!-- Filters -->
          <div class="row g-3 mb-4 filter-boxes"> <div class="col-md-4">
              <select id="filterStaff" class="form-select fs-5">
                <option value="">All Staff</option> </select>
            </div>

            <div class="col-md-4">
              <select id="filterDepartment" class="form-select fs-5">
                <option value="">All Departments</option> </select>
            </div>

            <div class="col-md-4">
              <select id="filterStatus" class="form-select fs-5">
                <option value="">Filter by Status</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
              </select>
            </div>
          </div> <div class="row" id="kpiCardsContainer">
          </div>
        </main>
      </div>
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- External JS -->
    <script type="module" src="../scripts/render-sidebar.js"></script>
    <script>
      // Remove or comment out: import { sampleKpis, sampleStaff, sampleDepartments } from './sample-data.js';

document.addEventListener("DOMContentLoaded", async () => {
  const kpiCardsContainer = document.getElementById("kpiCardsContainer");
  const filterStaffSelect = document.getElementById("filterStaff");
  const filterDepartmentSelect = document.getElementById("filterDepartment");
  const filterStatusSelect = document.getElementById("filterStatus");

  let allKpis = []; // Store the full list of KPIs
  let allStaff = []; // Store the full list of staff
  let allDepartments = []; // Store the full list of departments

  // Function to fetch data from the server
  async function fetchKpiData() {
    try {
      const response = await fetch("/manage/kpis-data"); // Call your new API endpoint
      if (!response.ok) {
        if (response.status === 401) {
          window.location.href = "/login"; // Redirect to login if unauthorized
          return;
        }
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      const data = await response.json();
      allKpis = data.kpis;
      allStaff = data.staff;
      allDepartments = data.departments;

      renderFilters();
      renderKpiCards(allKpis); // Initial render with all KPIs
    } catch (error) {
      console.error("Error fetching KPI data:", error);
      kpiCardsContainer.innerHTML =
        '<p class="text-danger">Failed to load KPIs. Please try again later.</p>';
    }
  }

  // Function to render filter options
  function renderFilters() {
    // Populate Staff filter
    filterStaffSelect.innerHTML = '<option value="">All Staff</option>';
    allStaff.forEach((staffMember) => {
      const option = document.createElement("option");
      option.value = staffMember._id; // Assuming staffMember._id is the user ID
      option.textContent = staffMember.name;
      filterStaffSelect.appendChild(option);
    });

    // Populate Department filter
    filterDepartmentSelect.innerHTML = '<option value="">All Departments</option>';
    allDepartments.forEach((department) => {
      const option = document.createElement("option");
      option.value = department;
      option.textContent = department;
      filterDepartmentSelect.appendChild(option);
    });
  }

  // Function to render KPI cards
  function renderKpiCards(kpisToRender) {
    kpiCardsContainer.innerHTML = ""; // Clear existing cards
    if (kpisToRender.length === 0) {
      kpiCardsContainer.innerHTML = '<p class="col-12">No KPIs found matching your criteria.</p>';
      return;
    }

    kpisToRender.forEach((kpi) => {
      const cardHtml = `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title text-primary">${kpi.title}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">Assigned to: ${kpi.assignedTo ? kpi.assignedTo.name : 'N/A'} (${kpi.assignedTo ? kpi.assignedTo.department : 'N/A'})</h6>
                        <p class="card-text"><strong>Description:</strong> ${kpi.description}</p>
                        <p class="card-text"><strong>Target:</strong> ${kpi.target}</p>
                        <p class="card-text"><strong>Due Date:</strong> ${new Date(kpi.dueDate).toLocaleDateString()}</p>
                        <p class="card-text"><strong>Status:</strong> <span class="badge ${getStatusBadgeClass(kpi.status)}">${kpi.status}</span></p>
                        <p class="card-text"><small class="text-muted">Assigned by: ${kpi.assignedBy ? kpi.assignedBy.name : 'N/A'}</small></p>
                        <div class="d-flex justify-content-end">
                            <a href="/manager/edit-kpi/${kpi._id}" class="btn btn-sm btn-outline-primary me-2">Edit</a>
                            <button class="btn btn-sm btn-outline-danger" data-kpi-id="${kpi._id}">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
      kpiCardsContainer.insertAdjacentHTML("beforeend", cardHtml);
    });
  }

  // Helper function for status badge class
  function getStatusBadgeClass(status) {
    switch (status) {
      case "Pending":
        return "bg-warning";
      case "Approved":
        return "bg-success";
      case "Rejected":
        return "bg-danger";
      default:
        return "bg-secondary";
    }
  }

  // Apply filters function
  function applyFilters() {
    const selectedStaffId = filterStaffSelect.value;
    const selectedDepartment = filterDepartmentSelect.value;
    const selectedStatus = filterStatusSelect.value;

    let filteredKpis = allKpis;

    if (selectedStaffId) {
      filteredKpis = filteredKpis.filter(
        (kpi) => kpi.assignedTo && kpi.assignedTo._id === selectedStaffId
      );
    }

    if (selectedDepartment) {
      filteredKpis = filteredKpis.filter(
        (kpi) => kpi.assignedTo && kpi.assignedTo.department === selectedDepartment
      );
    }

    if (selectedStatus) {
      filteredKpis = filteredKpis.filter((kpi) => kpi.status === selectedStatus);
    }

    renderKpiCards(filteredKpis);
  }

  // Event listeners for filters
  filterStaffSelect.addEventListener("change", applyFilters);
  filterDepartmentSelect.addEventListener("change", applyFilters);
  filterStatusSelect.addEventListener("change", applyFilters);

  // Initial data fetch when the page loads
  fetchKpiData();

  // Handle the reset button if it's meant to clear filters
  document.getElementById("BTN-RESET").addEventListener("click", () => {
    filterStaffSelect.value = "";
    filterDepartmentSelect.value = "";
    filterStatusSelect.value = "";
    applyFilters(); // Re-apply filters after clearing
  });

  // Event delegation for delete buttons (assuming you'll implement deletion)
  kpiCardsContainer.addEventListener("click", async (event) => {
    if (event.target.classList.contains("btn-outline-danger")) {
      const kpiId = event.target.dataset.kpiId;
      if (confirm("Are you sure you want to delete this KPI?")) {
        try {
          const response = await fetch(`/api/kpis/${kpiId}`, { method: 'DELETE' });
          if (!response.ok) {
            throw new Error('Failed to delete KPI');
          }
          await fetchKpiData(); // Re-fetch and re-render after deletion
        } catch (error) {
          console.error("Error deleting KPI:", error);
          alert("Error deleting KPI. Please try again.");
        }
      }
    }
  });
});
    </script>
    <script src="../scripts/manager-view-kpi.js"></script>
  </body>
</html>
